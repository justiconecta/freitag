<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A5F38">
  <title>Assistente Freitag | Freitag Laboratórios</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --freitag-green: #0A5F38;
      --freitag-green-light: #12845A;
      --freitag-green-dark: #064428;
      --freitag-accent: #7ED957;
      --freitag-glow: rgba(126, 217, 87, 0.15);
      --freitag-glow-strong: rgba(126, 217, 87, 0.25);
      --bg-primary: #FAFBFC;
      --bg-secondary: #F3F5F7;
      --bg-card: #FFFFFF;
      --bg-input: #F8F9FA;
      --bg-user-message: linear-gradient(135deg, var(--freitag-green) 0%, var(--freitag-green-light) 100%);
      --bg-assistant-message: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #4A5568;
      --text-muted: #718096;
      --text-on-dark: #FFFFFF;
      --border-light: #E2E8F0;
      --border-medium: #CBD5E0;
      --shadow-sm: 0 2px 8px rgba(10, 95, 56, 0.06);
      --shadow-md: 0 4px 20px rgba(10, 95, 56, 0.08);
      --shadow-lg: 0 20px 60px rgba(10, 95, 56, 0.12);
      --shadow-message: 0 2px 12px rgba(0, 0, 0, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --transition-fast: all 0.15s ease;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* ===== LAYOUT PRINCIPAL ===== */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 100%;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--freitag-green-dark) 0%, var(--freitag-green) 50%, var(--freitag-green-light) 100%);
      position: relative;
      flex-shrink: 0;
      z-index: 100;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--freitag-accent), var(--freitag-green-light), var(--freitag-accent));
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--freitag-accent);
    }

    .logo-text h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-on-dark);
      letter-spacing: -0.5px;
    }

    .logo-text span {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-badge {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      background: var(--freitag-accent);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    .header-badge span {
      color: var(--text-on-dark);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 16px 8px 10px;
      border-radius: var(--radius-full);
      backdrop-filter: blur(8px);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-avatar svg {
      width: 18px;
      height: 18px;
      fill: var(--text-on-dark);
    }

    .user-name {
      color: var(--text-on-dark);
      font-size: 0.85rem;
      font-weight: 600;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-new-chat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-full);
      color: var(--text-on-dark);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(8px);
    }

    .btn-new-chat:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .btn-new-chat svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ===== ÁREA DE CHAT ===== */
    .chat-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-primary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border-medium);
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .messages-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ===== MENSAGENS ===== */
    .message {
      display: flex;
      gap: 14px;
      animation: messageSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes messageSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, var(--freitag-green) 0%, var(--freitag-green-light) 100%);
      color: var(--text-on-dark);
      box-shadow: 0 4px 12px rgba(10, 95, 56, 0.25);
    }

    .message.assistant .message-avatar svg {
      width: 22px;
      height: 22px;
      fill: var(--text-on-dark);
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, #E2E8F0 0%, #CBD5E0 100%);
      color: var(--text-secondary);
    }

    .message-content {
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.user .message-content {
      align-items: flex-end;
    }

    .message-bubble {
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      font-size: 0.95rem;
      line-height: 1.7;
      position: relative;
    }

    .message.assistant .message-bubble {
      background: var(--bg-assistant-message);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
      box-shadow: var(--shadow-message);
    }

    .message.user .message-bubble {
      background: var(--bg-user-message);
      color: var(--text-on-dark);
      border-radius: var(--radius-lg) var(--radius-lg) 6px var(--radius-lg);
      box-shadow: 0 4px 16px rgba(10, 95, 56, 0.2);
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .message.user .message-time {
      text-align: right;
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      gap: 14px;
      animation: messageSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .typing-indicator .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--freitag-green) 0%, var(--freitag-green-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(10, 95, 56, 0.25);
    }

    .typing-indicator .message-avatar svg {
      width: 22px;
      height: 22px;
      fill: var(--text-on-dark);
    }

    .typing-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-message);
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--freitag-green);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    /* ===== WELCOME STATE ===== */
    .welcome-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, var(--freitag-green) 0%, var(--freitag-green-light) 100%);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 12px 40px rgba(10, 95, 56, 0.25);
      position: relative;
    }

    .welcome-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--freitag-accent), var(--freitag-green-light));
      opacity: 0.3;
      z-index: -1;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.05); }
    }

    .welcome-icon svg {
      width: 48px;
      height: 48px;
      fill: var(--text-on-dark);
    }

    .welcome-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .welcome-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 40px;
    }

    /* ===== INPUT AREA ===== */
    .input-area {
      flex-shrink: 0;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-light);
      padding: 16px;
      position: relative;
    }

    .input-area::before {
      content: '';
      position: absolute;
      top: -40px;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(to top, var(--bg-primary), transparent);
      pointer-events: none;
    }

    .input-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .input-wrapper {
      background: var(--bg-card);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 12px 16px;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .input-wrapper:focus-within {
      border-color: var(--freitag-green);
      box-shadow: 0 0 0 4px var(--freitag-glow);
    }

    .input-actions-left {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-bottom: 4px;
    }

    .btn-attachment {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: var(--transition-fast);
    }

    .btn-attachment:hover {
      background: var(--bg-input);
      color: var(--freitag-green);
    }

    .btn-attachment svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .textarea-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text-primary);
      background: transparent;
      max-height: 150px;
      min-height: 24px;
      padding: 6px 0;
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    .input-actions-right {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    .char-counter {
      font-size: 0.75rem;
      color: var(--text-muted);
      min-width: 60px;
      text-align: right;
    }

    .char-counter.warning {
      color: #F59E0B;
    }

    .char-counter.limit {
      color: #EF4444;
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border: none;
      background: linear-gradient(135deg, var(--freitag-green) 0%, var(--freitag-green-light) 100%);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-on-dark);
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(10, 95, 56, 0.25);
    }

    .btn-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 95, 56, 0.35);
    }

    .btn-send:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-send svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .input-footer svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* ===== MESSAGE FORMATTING ===== */
    .message-bubble p {
      margin-bottom: 12px;
    }

    .message-bubble p:last-child {
      margin-bottom: 0;
    }

    .message-bubble ul,
    .message-bubble ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .message-bubble li {
      margin-bottom: 6px;
    }

    .message-bubble code {
      background: rgba(10, 95, 56, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Fira Code', 'SF Mono', monospace;
      font-size: 0.9em;
    }

    .message-bubble pre {
      background: var(--text-primary);
      color: #E2E8F0;
      padding: 16px;
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: 12px 0;
    }

    .message-bubble pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    .message-bubble strong {
      font-weight: 600;
      color: var(--freitag-green);
    }

    .message.user .message-bubble strong {
      color: var(--freitag-accent);
    }

    /* ===== MESSAGE ACTIONS ===== */
    .message-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: var(--transition-fast);
    }

    .message:hover .message-actions {
      opacity: 1;
    }

    .btn-action {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: var(--transition-fast);
    }

    .btn-action:hover {
      background: var(--freitag-glow);
      color: var(--freitag-green);
    }

    .btn-action svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .header-content {
        padding: 12px 16px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
      }

      .logo-text h1 {
        font-size: 1.2rem;
      }

      .logo-text span {
        font-size: 0.65rem;
      }

      .header-badge {
        display: none;
      }

      .user-badge {
        padding: 6px 12px 6px 8px;
      }

      .user-avatar {
        width: 28px;
        height: 28px;
      }

      .user-avatar svg {
        width: 16px;
        height: 16px;
      }

      .user-name {
        max-width: 100px;
        font-size: 0.8rem;
      }

      .btn-new-chat span {
        display: none;
      }

      .btn-new-chat {
        padding: 10px;
        border-radius: var(--radius-md);
      }

      .chat-messages {
        padding: 16px 12px;
      }

      .messages-container {
        gap: 18px;
      }

      .message-content {
        max-width: 85%;
      }

      .message-avatar {
        width: 36px;
        height: 36px;
      }

      .message-bubble {
        padding: 14px 16px;
        font-size: 0.9rem;
      }

      .welcome-state {
        padding: 24px 16px;
      }

      .welcome-icon {
        width: 72px;
        height: 72px;
      }

      .welcome-icon svg {
        width: 40px;
        height: 40px;
      }

      .welcome-title {
        font-size: 1.4rem;
      }

      .welcome-subtitle {
        font-size: 0.9rem;
      }

      .input-area {
        padding: 12px;
      }

      .input-wrapper {
        padding: 10px 12px;
      }

      .btn-send {
        width: 40px;
        height: 40px;
      }

      .char-counter {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .message {
        gap: 10px;
      }

      .message-avatar {
        width: 32px;
        height: 32px;
      }

      .message.assistant .message-avatar svg,
      .typing-indicator .message-avatar svg {
        width: 18px;
        height: 18px;
      }

      .typing-indicator .message-avatar {
        width: 32px;
        height: 32px;
      }

      .input-actions-left {
        display: none;
      }
    }

    /* ===== SCROLLBAR MOBILE ===== */
    @media (hover: none) and (pointer: coarse) {
      .chat-messages::-webkit-scrollbar {
        width: 3px;
      }
    }

    /* ===== ANIMATION UTILITIES ===== */
    .hidden {
      display: none !important;
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
          </div>
          <div class="logo-text">
            <h1>Freitag</h1>
            <span>Assistente Virtual</span>
          </div>
        </div>

        <div class="header-actions">
          <div class="user-badge">
            <div class="user-avatar">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <span class="user-name" id="userName">Usuário</span>
          </div>
          <div class="header-badge">
            <div class="badge-dot"></div>
            <span>Online</span>
          </div>
          <button class="btn-new-chat" id="btnNewChat" title="Nova conversa">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>Nova conversa</span>
          </button>
        </div>
      </div>
    </header>

    <!-- CHAT AREA -->
    <div class="chat-area">
      <!-- Welcome State -->
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
        </div>
        <h2 class="welcome-title">Olá! Como posso ajudar?</h2>
        <p class="welcome-subtitle">
          Sou o assistente virtual da Freitag Laboratórios. Posso ajudar com informações sobre análises, amostras, resultados e muito mais.
        </p>


      </div>

      <!-- Chat Messages -->
      <div class="chat-messages hidden" id="chatMessages">
        <div class="messages-container" id="messagesContainer">
          <!-- Messages will be inserted here -->
        </div>
      </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <div class="input-container">
        <div class="input-wrapper">
          <div class="input-actions-left">
            <button type="button" class="btn-attachment" title="Anexar arquivo">
              <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
            </button>
          </div>

          <div class="textarea-wrapper">
            <textarea 
              id="messageInput" 
              placeholder="Digite sua mensagem..." 
              rows="1"
              maxlength="4000"
            ></textarea>
          </div>

          <div class="input-actions-right">
            <span class="char-counter" id="charCounter">0 / 4000</span>
            <button type="button" class="btn-send" id="btnSend" disabled title="Enviar mensagem">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>

        <div class="input-footer">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          <span>Suas informações estão protegidas e criptografadas</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============ ELEMENTOS ============
    const welcomeState = document.getElementById('welcomeState');
    const chatMessages = document.getElementById('chatMessages');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const btnSend = document.getElementById('btnSend');
    const btnNewChat = document.getElementById('btnNewChat');
    const charCounter = document.getElementById('charCounter');

    // ============ STATE ============
    let isTyping = false;
    let conversationHistory = [];

    // ============ UTILITIES ============
    function getCurrentTime() {
      return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function generateId() {
      return 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatMessage(text) {
      // Processar markdown básico
      let formatted = escapeHtml(text);
      
      // Bold: **text** ou __text__
      formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      formatted = formatted.replace(/__(.*?)__/g, '<strong>$1</strong>');
      
      // Italic: *text* ou _text_
      formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');
      formatted = formatted.replace(/_(.*?)_/g, '<em>$1</em>');
      
      // Code inline: `code`
      formatted = formatted.replace(/`(.*?)`/g, '<code>$1</code>');
      
      // Line breaks
      formatted = formatted.replace(/\n/g, '<br>');
      
      return formatted;
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ============ MESSAGE HANDLING ============
    function addMessage(content, type = 'user') {
      const messageId = generateId();
      const time = getCurrentTime();
      
      const messageHtml = `
        <div class="message ${type}" id="${messageId}">
          <div class="message-avatar">
            ${type === 'assistant' 
              ? '<svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>'
              : '<span>Eu</span>'
            }
          </div>
          <div class="message-content">
            <div class="message-bubble">${formatMessage(content)}</div>
            <div class="message-time">${time}</div>
            ${type === 'assistant' ? `
              <div class="message-actions">
                <button class="btn-action" title="Copiar" onclick="copyMessage('${messageId}')">
                  <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
                <button class="btn-action" title="Curtir" onclick="likeMessage('${messageId}')">
                  <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                </button>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
      
      conversationHistory.push({ type, content, time, id: messageId });
      
      scrollToBottom();
      
      return messageId;
    }

    function showTypingIndicator() {
      const typingHtml = `
        <div class="typing-indicator" id="typingIndicator">
          <div class="message-avatar">
            <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
          </div>
          <div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      `;
      
      messagesContainer.insertAdjacentHTML('beforeend', typingHtml);
      scrollToBottom();
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }

    // ============ SIMULATE RESPONSE ============
    async function getAssistantResponse(userMessage) {
      // Simular delay de resposta (1-3 segundos)
      const delay = 1000 + Math.random() * 2000;
      await new Promise(resolve => setTimeout(resolve, delay));

      // Respostas simuladas baseadas em keywords
      const lowerMessage = userMessage.toLowerCase();
      
      if (lowerMessage.includes('análise') || lowerMessage.includes('análises')) {
        return `Realizamos uma ampla gama de **análises laboratoriais**, incluindo:

• **Microbiológicas**: Coliformes, E. coli, Salmonella, Mesófilos, Bolores e Leveduras
• **Físico-Químicas**: pH, Umidade, Proteína, Minerais, Metais
• **Águas**: Potabilidade, Efluentes, Águas Superficiais
• **Solos**: Fertilidade, Contaminantes, Caracterização

Posso ajudar com informações mais específicas sobre algum tipo de análise?`;
      }
      
      if (lowerMessage.includes('amostra') || lowerMessage.includes('enviar') || lowerMessage.includes('envio')) {
        return `Para enviar amostras para análise, siga estes passos:

1. **Preencha a Cadeia de Custódia** digital ou física com todos os dados da amostra
2. **Identifique corretamente** cada amostra com etiqueta contendo código único
3. **Acondicione adequadamente** conforme o tipo de amostra e análise solicitada
4. **Mantenha a temperatura** indicada durante o transporte
5. **Envie ou entregue** no prazo máximo de conservação

Precisa de ajuda com algum desses passos?`;
      }
      
      if (lowerMessage.includes('prazo') || lowerMessage.includes('tempo') || lowerMessage.includes('resultado')) {
        return `Os **prazos para entrega dos resultados** variam conforme o tipo de análise:

• **Análises rápidas** (pH, Temperatura): 24-48 horas
• **Microbiológicas básicas**: 3-5 dias úteis
• **Físico-químicas completas**: 5-7 dias úteis
• **Análises especiais**: 7-15 dias úteis

Os resultados são enviados por e-mail assim que disponíveis. Você também pode acompanhar o status pelo nosso portal do cliente.`;
      }
      
      if (lowerMessage.includes('laudo') || lowerMessage.includes('interpretar') || lowerMessage.includes('leitura')) {
        return `Para **interpretar seu laudo de análise**, observe:

1. **Cabeçalho**: Dados do cliente e identificação da amostra
2. **Metodologia**: Métodos utilizados conforme normas técnicas
3. **Resultados**: Valores encontrados para cada parâmetro
4. **Limites de Referência**: Valores aceitáveis pela legislação
5. **Conclusão**: Conformidade ou não-conformidade

Os valores dentro dos limites aparecem em **verde** ✅
Valores fora dos limites aparecem em **vermelho** ⚠️

Quer que eu explique algum parâmetro específico do seu laudo?`;
      }
      
      if (lowerMessage.includes('olá') || lowerMessage.includes('oi') || lowerMessage.includes('bom dia') || lowerMessage.includes('boa tarde') || lowerMessage.includes('boa noite')) {
        return `Olá! 👋 Seja bem-vindo ao atendimento virtual da **Freitag Laboratórios**!

Estou aqui para ajudar com:
• Informações sobre tipos de análises
• Orientações para coleta e envio de amostras
• Dúvidas sobre resultados e laudos
• Prazos e procedimentos

Como posso ajudá-lo hoje?`;
      }
      
      if (lowerMessage.includes('preço') || lowerMessage.includes('valor') || lowerMessage.includes('custo') || lowerMessage.includes('orçamento')) {
        return `Para solicitar um **orçamento personalizado**, preciso de algumas informações:

1. **Tipo de amostra**: Alimento, água, solo, etc.
2. **Análises desejadas**: Microbiológicas, físico-químicas, etc.
3. **Quantidade de amostras**: Número total
4. **Frequência**: Análise única ou rotina

Você pode informar esses dados ou, se preferir, nossa equipe comercial pode entrar em contato: **(47) 3333-0000** ou **comercial@freitaglab.com.br**`;
      }
      
      // Resposta padrão
      return `Obrigado pela sua mensagem! 

Sou o assistente virtual da Freitag Laboratórios e posso ajudar com:

• **Informações sobre análises** laboratoriais
• **Orientações** para coleta e envio de amostras
• **Dúvidas** sobre resultados e laudos
• **Prazos** e procedimentos

Para questões mais específicas ou técnicas, recomendo entrar em contato com nossa equipe:
📞 **(47) 3333-0000**
📧 **atendimento@freitaglab.com.br**

Posso ajudar com algo mais?`;
    }

    // ============ SEND MESSAGE ============
    async function sendMessage() {
      const message = messageInput.value.trim();
      
      if (!message || isTyping) return;

      // Esconder welcome state e mostrar chat
      welcomeState.classList.add('hidden');
      chatMessages.classList.remove('hidden');

      // Adicionar mensagem do usuário
      addMessage(message, 'user');

      // Limpar input
      messageInput.value = '';
      autoResizeTextarea();
      updateCharCounter();
      btnSend.disabled = true;

      // Mostrar typing indicator
      isTyping = true;
      showTypingIndicator();

      try {
        // Obter resposta do assistente
        const response = await getAssistantResponse(message);
        
        // Esconder typing e mostrar resposta
        hideTypingIndicator();
        addMessage(response, 'assistant');
      } catch (error) {
        hideTypingIndicator();
        addMessage('Desculpe, ocorreu um erro ao processar sua mensagem. Por favor, tente novamente.', 'assistant');
      } finally {
        isTyping = false;
      }
    }

    // ============ NEW CHAT ============
    function startNewChat() {
      // Limpar mensagens
      messagesContainer.innerHTML = '';
      conversationHistory = [];

      // Mostrar welcome state
      chatMessages.classList.add('hidden');
      welcomeState.classList.remove('hidden');

      // Limpar input
      messageInput.value = '';
      autoResizeTextarea();
      updateCharCounter();
    }

    // ============ COPY MESSAGE ============
    function copyMessage(messageId) {
      const message = conversationHistory.find(m => m.id === messageId);
      if (message) {
        navigator.clipboard.writeText(message.content).then(() => {
          // Feedback visual
          const btn = document.querySelector(`#${messageId} .btn-action[title="Copiar"]`);
          if (btn) {
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            setTimeout(() => {
              btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
            }, 2000);
          }
        });
      }
    }

    // ============ LIKE MESSAGE ============
    function likeMessage(messageId) {
      const btn = document.querySelector(`#${messageId} .btn-action[title="Curtir"]`);
      if (btn) {
        btn.style.color = 'var(--freitag-green)';
        btn.style.background = 'var(--freitag-glow-strong)';
      }
    }

    // ============ AUTO RESIZE TEXTAREA ============
    function autoResizeTextarea() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    }

    // ============ UPDATE CHAR COUNTER ============
    function updateCharCounter() {
      const count = messageInput.value.length;
      const max = 4000;
      
      charCounter.textContent = `${count} / ${max}`;
      
      charCounter.classList.remove('warning', 'limit');
      if (count > max * 0.9) {
        charCounter.classList.add('limit');
      } else if (count > max * 0.75) {
        charCounter.classList.add('warning');
      }
      
      // Habilitar/desabilitar botão de enviar
      btnSend.disabled = count === 0 || isTyping;
    }

    // ============ EVENT LISTENERS ============
    messageInput.addEventListener('input', () => {
      autoResizeTextarea();
      updateCharCounter();
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    btnSend.addEventListener('click', sendMessage);

    btnNewChat.addEventListener('click', startNewChat);

    // ============ SET USER NAME ============
    function setUserName(name) {
      const userNameEl = document.getElementById('userName');
      if (userNameEl && name) {
        userNameEl.textContent = name;
      }
    }

    // Exemplo: definir nome do usuário (substitua pela integração real)
    // setUserName('João Silva');

    // Focus no input ao carregar
    messageInput.focus();

    // ============ PREVENT ZOOM ON IOS ============
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
  </script>

</body>
</html>
